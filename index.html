<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Album Guesser</title>
  <meta name="description"
        content="Guess the album from its cover. It starts as a 3×3 blur and sharpens with every clue — how few do you need?">
  <meta property="og:title" content="Album Guesser">
  <meta property="og:description"
        content="Guess the album from its cover. It starts as a 3×3 blur and sharpens with every clue.">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 3 3'><rect x='0' y='0' width='1' height='1' fill='%23f2a33c'/><rect x='1' y='0' width='1' height='1' fill='%23e5484d'/><rect x='2' y='0' width='1' height='1' fill='%237e4bb3'/><rect x='0' y='1' width='1' height='1' fill='%233f88c5'/><rect x='1' y='1' width='1' height='1' fill='%23f5f3ee'/><rect x='2' y='1' width='1' height='1' fill='%232a9d8f'/><rect x='0' y='2' width='1' height='1' fill='%23e76f51'/><rect x='1' y='2' width='1' height='1' fill='%23ffd166'/><rect x='2' y='2' width='1' height='1' fill='%23457b9d'/></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <!-- Non-blocking font load: first paint must be instant so a refresh
       replaces the previous page's held frame immediately. -->
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500..800&display=swap"
        rel="stylesheet" media="print" onload="this.media='all'">
  <noscript>
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500..800&display=swap"
          rel="stylesheet">
  </noscript>
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="game" class="booting">
  <header class="site-head">
    <a class="brand" href="index.html">
      <span class="mark" aria-hidden="true"></span>
      <span class="brand-name">Album Guesser</span>
    </a>
    <p class="brand-tag">Guess the album from its cover — it sharpens with every clue</p>
  </header>
  <main>
    <div class="art-frame">
      <p id="loading" class="loading">Loading…</p>
      <button id="start-clue" hidden>Start first clue ▶</button>
      <canvas id="art" hidden></canvas>
    </div>
    <!-- Everything but the art. Invisible as a box normally
         (display: contents); becomes the side rail in live mode. -->
    <div class="panel">
      <div class="nav-bar">
        <button id="random">Random</button>
        <input id="jump-input" type="number" min="1" placeholder="rank">
        <button id="jump-go">Go</button>
        <span class="sep" aria-hidden="true"></span>
        <div id="progress" aria-hidden="true"></div>
        <span id="stage-label"></span>
        <span class="sep" aria-hidden="true"></span>
        <span id="timer"></span>
        <input id="timer-secs" type="number" min="3" max="600" value="10"
               title="Seconds per clue">
        <button id="timer-pause" title="Pause auto-advance">⏸</button>
        <span class="sep" aria-hidden="true"></span>
        <button id="live-toggle" title="Live mode: big art, side controls, no guess bar">Live</button>
      </div>
      <ul id="clues"></ul>
      <div id="answer" style="display: none">
        <p class="result-banner"></p>
        <p class="album-name"></p>
        <p class="artist-name"></p>
        <p class="meta"></p>
        <p class="spotify-row"></p>
        <p class="share-row"></p>
      </div>
      <div class="controls">
        <div class="guess-wrap">
          <ul id="suggestions" hidden></ul>
          <input id="guess-input" type="text" autocomplete="off"
                 placeholder="Your guess: artist – album">
          <button id="guess-go">Guess</button>
          <span id="lives" title="Wrong guesses left"></span>
        </div>
        <button id="next">Next clue</button>
      </div>
      <div class="reveal-row">
        <button id="reveal" class="danger">Reveal</button>
      </div>
    </div>
  </main>
  <script src="app.js"></script>
</body>
</html>
